- name: Check installed helm version
  command: helm version --short
  register: helm_installed
  failed_when: false
  changed_when: false


- name: Download Helm archive
  get_url:
    url: "{{ helm_url }}"
    dest: "/tmp/{{ helm_archive }}"
    mode: '0644'
  when: helm_version not in (helm_installed.stdout | default(""))


- name: Extract Helm archive
  unarchive:
    src: "/tmp/{{ helm_archive }}"
    dest: /tmp/
    remote_src: true
  when: helm_version not in (helm_installed.stdout | default(""))


- name: Install Helm binary
  copy:
    src: "/tmp/{{ helm_platform }}/helm"
    dest: /usr/local/bin/helm
    mode: '0755'
    remote_src: true
  when: helm_version not in (helm_installed.stdout | default(""))

- name: Verify Helm version
  command: helm version --short
  register: helm_verify
  changed_when: false

- debug:
    var: helm_output.stdout

