
- name: "Check if cluster already initialized"
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_init


- name: Read admin.conf content
  ansible.builtin.slurp:
    src: /etc/kubernetes/admin.conf
  register: admin_conf_encoded
  when: k8s_init.stat.exists

- name: Extract endpoint with safer parsing
  ansible.builtin.set_fact:
    current_endpoint: >-
      {{ 
        (admin_conf_encoded.content | b64decode | from_yaml)
        .clusters | map(attribute='cluster.server') | first | default('none')
      }}
  when: admin_conf_encoded.content is defined


- name: Determine endpoint type
  ansible.builtin.set_fact:
    endpoint_type: >-
      {% set clean_host = current_endpoint | replace('https://', '') | split(':') | first %}
      {{ 'ip' if clean_host | ansible.utils.ipaddr else 'dns' }}
  when: 
    - current_endpoint is defined
    - current_endpoint is not none
    - current_endpoint | string | trim | lower not in ['none', 'null', '']

- name: Debug endpoint type
  ansible.builtin.debug:
     msg:
       "Endpoint Type:{{ endpoint_type }}"
  when: endpoint_type is defined

- name: Extract endpoint hostname
  ansible.builtin.set_fact:
    endpoint_host: >-
      {{
        current_endpoint
        | regex_replace('^https?://', '')
        | regex_replace(':[0-9]+$', '')
      }}
  when: 
    - endpoint_type is defined
    - endpoint_type | trim == 'dns'
    - current_endpoint is defined
    - current_endpoint != 'none'
    


- name: Resolve endpoint hostname
  ansible.builtin.command:
    cmd: getent hosts {{ endpoint_host }}
  register: endpoint_resolution
  changed_when: false
  failed_when: false
  when: endpoint_host is defined

- name: Extract resolved IP
  ansible.builtin.set_fact:
    resolved_ip: "{{ endpoint_resolution.stdout.split()[0] }}"
  when:
    - endpoint_host is defined 
    - endpoint_resolution.rc == 0

- name: Fail if DNS endpoint cannot be resolved
  ansible.builtin.fail:
    msg: >-
      Unable to resolve Kubernetes controlPlaneEndpoint hostname:
      {{
        endpoint_host
      }}
  when:
    - endpoint_host is defined 
    - endpoint_resolution.rc != 0
    

- name: Debug Resolved IP
  ansible.builtin.debug:
     msg:
       "Resolved IP:{{ resolved_ip }}"
  when: resolved_ip is defined

- name: Update current_endpoint with resolved IP
  ansible.builtin.set_fact:
    current_endpoint: "{{ resolved_ip }}:6443"
  when: 
    - resolved_ip is defined
    - resolved_ip | length > 0


- name: Determine whether cluster reset is required
  ansible.builtin.set_fact:
    reset_required: >-
      {{
        k8s_init.stat.exists
        and (current_endpoint | default('') != target_endpoint)
      }}

- name: Debug endpoint status
  ansible.builtin.debug:
    msg:
      - "Cluster already initialized: {{ k8s_init.stat.exists }}"
      - "Current endpoint: {{ current_endpoint | default('NOT_INITIALIZED') }}"
      - "Target endpoint: {{ target_endpoint }}"
      - "Reset required: {{ reset_required }}"


- name: Reset and reinitialize cluster(Wipe Master)
  when: reset_required | default(false)
  block:

    - name: Run kubeadm reset
      ansible.builtin.command: kubeadm reset --force
      register: reset_result
      changed_when: true

    - name: Flush iptables rules
      ansible.builtin.iptables:
        table: "{{ table_name }}"
        flush: true
      loop:
        - filter
        - nat
        - mangle
      loop_control:
        loop_var: table_name

    - name: Remove Kubernetes and CNI directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cni/net.d
        - /var/lib/cni
        - /var/lib/etcd
        - /var/lib/kubelet
        - /etc/kubernetes/manifests
        - /etc/kubernetes/pki
        - /root/.kube
        - "/home/{{ ansible_user }}/.kube"

    - name: Recreate Kubernetes directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet

    - name: Restart container runtime
      ansible.builtin.service:
        name: containerd
        state: restarted

    - name: Restart kubelet
      ansible.builtin.service:
        name: kubelet
        state: restarted


- name: Force wipe all worker nodes from Master role
  block:
    - name: Stop services and wipe worker files
      ansible.builtin.shell: |
        systemctl stop kubelet containerd
        mount | grep "/var/lib/kubelet" | awk '{print $3}' | xargs -r umount -l
        rm -rf /etc/kubernetes/ /var/lib/kubelet/ /var/lib/etcd/ /etc/cni/net.d/ /var/lib/cni/
        iptables -F && iptables -t nat -F && iptables -X
        systemctl restart containerd
      delegate_to: "{{ item }}"
      loop: "{{ groups['worker_nodes'] }}"
      become: yes
  when: reset_required | default(false)

- name: "Create kubeadm config"
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
  when: not k8s_init.stat.exists or reset_required

- name: Pull Kubeadm config images
  ansible.builtin.command: kubeadm config images pull --config /tmp/kubeadm-config.yaml
  when: not k8s_init.stat.exists or reset_required

- name: "Initialize cluster"
  ansible.builtin.command: kubeadm init --config=/tmp/kubeadm-config.yaml --upload-certs
  when: not k8s_init.stat.exists or reset_required

- name: Create .kube directory in user home
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: "Set kubeconfig"
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Generate worker join command
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: join_cmd
  changed_when: false


- name: "Share join data"
  ansible.builtin.set_fact:
   kube_join:
      worker: "{{ join_cmd.stdout }}"
  run_once: true
