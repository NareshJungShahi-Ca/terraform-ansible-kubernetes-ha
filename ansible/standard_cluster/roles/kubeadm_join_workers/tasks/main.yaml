- name: Check if node exists in cluster
  ansible.builtin.command: 
    cmd: kubectl get node {{ inventory_hostname }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: k8s-master-0
  register: k8s_node_check
  failed_when: false
  changed_when: false

- name: Join worker nodes"
  ansible.builtin.command: "{{ hostvars[groups['master_nodes'][0]]['kube_join']['worker'] }}"
  when: k8s_node_check.rc != 0
