-  name: Ensure monitoring namespace exists
   kubernetes.core.k8s:
     name: "{{ monitoring_namespace }}"
     api_version: v1
     kind: Namespace
     state: present
     kubeconfig: "/etc/kubernetes/admin.conf"
   delegate_to: "{{ groups['master_nodes'][0]}}" 

- name: Add and Update Prometheus Helm repo
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"
    kubeconfig: "/etc/kubernetes/admin.conf"
  delegate_to: "{{ groups['master_nodes'][0]}}" 

- name: Copy Helm values file to remote
  copy:
    src: values.yaml  
    dest: /tmp/monitoring-values.yaml

- name: Ensure worker nodes have the worker role label
  kubernetes.core.k8s:
    kubeconfig: "/etc/kubernetes/admin.conf"
    state: patched
    kind: Node
    name: "{{ item }}"
    definition:
      metadata:
        labels:
          kubernetes.io/role: worker
  loop: "{{ groups['worker_nodes'] }}"
  delegate_to: "{{ groups['master_nodes'][0] }}"


- name: Install kube-prometheus-stack
  kubernetes.core.helm:
    name: "{{ helm_release_name }}"
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: "{{ monitoring_namespace }}"
    values_files:
      - /tmp/monitoring-values.yaml
    state: present
    kubeconfig: "/etc/kubernetes/admin.conf"
    wait: true 
    timeout: "900s"
  delegate_to: "{{ groups['master_nodes'][0]}}"  

