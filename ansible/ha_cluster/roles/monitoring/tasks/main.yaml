- name: Ensure monitoring namespace exists
  kubernetes.core.k8s:
     name: "{{ monitoring_namespace }}"
     api_version: v1
     kind: Namespace
     state: present
     kubeconfig: "./temp_admin.conf"
  delegate_to: localhost

- name: Add and Update Prometheus Helm repo
  kubernetes.core.helm_repository:
    name: prometheus-community 
    repo_url: "https://prometheus-community.github.io/helm-charts"
    kubeconfig: "./temp_admin.conf"
  delegate_to: localhost

- name: Ensure worker nodes have the worker role label
  kubernetes.core.k8s:
    state: patched
    kubeconfig: "./temp_admin.conf"
    kind: Node
    name: "{{ item }}"
    definition:
      metadata:
        labels:
          kubernetes.io/role: worker
  loop: "{{ groups['worker_nodes'] }}"
  delegate_to: localhost

- name: Install kube-prometheus-stack
  kubernetes.core.helm:
    name: "{{ helm_release_name }}"
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: "{{ monitoring_namespace }}"
    values_files:
      - "{{ role_path }}/files/values.yaml"
    state: present
    kubeconfig: "./temp_admin.conf"
    wait: true 
  delegate_to: localhost 

